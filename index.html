<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>空运成本计算器（分泡版+提货费）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 20px;
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            max-width: 600px;
            width: 100%;
        }

        .tool-buttons-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
            max-width: 600px;
            width: 100%;
        }

        .tool-button {
            background: #0066cc;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            text-decoration: none;
            white-space: nowrap;
            transition: 0.2s;
        }

        .tool-button:active {
            background: #0052a3;
            transform: scale(0.98);
        }

        .smart-input-section {
            background: white;
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0;
            max-width: 600px;
            width: 100%;
        }

        .smart-input-title {
            font-weight: 600;
            color: #16a085;
            margin-bottom: 6px;
        }

        .smart-input-box {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .calculator {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            max-width: 600px;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 14px;
        }

        th, td {
            border: 1px solid #eaeef2;
            padding: 8px 6px;
            text-align: left;
            font-weight: 500;      /* ← 这一行就是控制表头粗细的 */
        }

        td:first-child {
            background: #f8fafd;
            font-weight: 500;
            width: 30%;
        }

        .result {
            font-weight: 600;
            color: #2980b9;
            background: #e8f4fd;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            border-color: #3498db;
            outline: none;
        }

        .section-title {
            font-weight: 600;
            color: #16a085;
            margin: 15px 0 6px 0;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 4px;
        }

        .option-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .option-group label {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        .status-message {
            text-align: center;
            font-size: 13px;
            color: #7f8c8d;
            margin: 5px 0;
            padding: 6px;
            background: #f8f9fa;
            border-radius: 20px;
        }

        @media (max-width: 380px) {
            td { font-size: 13px; padding: 6px 4px; }
            .option-group label { font-size: 13px; padding: 6px; }
        }
    </style>
</head>
<body>
<h1>✈️ 空运成本计算器（分泡版+提货费）</h1>

<div class="tool-buttons-container">
    <a href="https://www.track-trace.com/" target="_blank" class="tool-button">物流跟踪</a>
    <a href="https://misaka0502ab.github.io/cargodata/" target="_blank" class="tool-button">数据转换</a>
    <a href="https://map.baidu.com" target="_blank" class="tool-button">百度地图</a>
    <a href="https://www.bing.com/maps" target="_blank" class="tool-button">Bing地图</a>
</div>

<div class="smart-input-section">
    <div class="smart-input-title">📦 智能识别</div>
    <input type="text" class="smart-input-box" id="smartInput" placeholder="250kgs / 0.75cbm">
</div>

<div class="calculator">
    <div class="status-message" id="statusMessage">请输入体积和重量</div>

    <div class="section-title">📊 基础参数</div>
    <table>
        <tr><th>体积(m³)</th><td><input type="number" id="volume" step="0.01"></td><th>泡重</th><td class="result" id="cw">-</td></tr>
        <tr><th>重量(KG)</th><td><input type="number" id="gw" step="0.01"></td><th>比重</th><td class="result" id="ratio">-</td></tr>
        <tr><th>汇率</th><td><input type="number" id="exchangeRate" step="0.01" value="6.85"></td><th>成本重</th><td class="result" id="costWeight">-</td></tr>
        <tr><th>提货费(RMB/KG)</th><td><input type="number" id="pickupRateRMB" step="0.01" placeholder=""></td>
            <th>提货费(USD/KG)</th><td class="result" id="pickupRateUSD">-</td></tr>
        <tr><th>提货费(RMB)</th><td class="result" id="pickupRMB">-</td>
            <th>提货费(USD)</th><td class="result" id="pickupUSD">-</td></tr>
    </table>

    <div class="section-title">💰 成本单价</div>
    <table>
        <tr><th>RMB/KG</th><td><input type="number" id="rmbPerKg" step="0.01"></td><th>泡后RMB</th><td class="result" id="rmbAfter">-</td></tr>
        <tr><th>USD/KG</th><td class="result" id="usdPerKg">-</td><th>泡后USD</th><td class="result" id="usdAfter">-</td></tr>
    </table>

    <div class="section-title">💵 总成本</div>
    <table>
        <tr><th colspan="2">总成本RMB</th><td class="result" id="totalRMB">-</td></tr>
        <tr><th colspan="2">总成本USD</th><td class="result" id="totalUSD">-</td></tr>
    </table>

    <div class="billing-bubble-container">
        <div><div class="section-title">🌏 计费标准</div>
            <div class="option-group">
                <label><input type="radio" name="billing" value="0.006" checked> 大陆(167)</label>
                <label><input type="radio" name="billing" value="0.007"> 香港(143)</label>
            </div></div>
        <div><div class="section-title">🎈 分泡比例</div>
            <div class="option-group" id="mainlandBubble">
                <label><input type="radio" name="bubble" value="0.5" checked> 55分</label>
                <label><input type="radio" name="bubble" value="0.4"> 46分</label>
                <label><input type="radio" name="bubble" value="0.3"> 37分</label>
                <label><input type="radio" name="bubble" value="0.2"> 28分</label>
            </div>
            <div class="option-group hidden" id="hongkongBubble">
                <label><input type="radio" name="bubbleHk" value="0.3333" checked> 1/3分</label>
                <label><input type="radio" name="bubbleHk" value="0.6667"> 2/3分</label>
            </div></div>
    </div>
</div>

<script>
    const volumeInput = document.getElementById('volume');
    const gwInput = document.getElementById('gw');
    const exchangeRateInput = document.getElementById('exchangeRate');
    const rmbPerKgInput = document.getElementById('rmbPerKg');
    const pickupRateRMBInput = document.getElementById('pickupRateRMB');
    const smartInput = document.getElementById('smartInput');
    const statusMessage = document.getElementById('statusMessage');

    function autoParseSmartInput() {
        const text = smartInput.value.trim();
        if (!text) return;
        const weightMatch = text.match(/(\d+\.?\d*)\s*(?:kgs?|千克|公斤)/i);
        const volumeMatch = text.match(/(\d+\.?\d*)\s*(?:cbm|立方米|m³|m3)/i);
        if (weightMatch) gwInput.value = parseFloat(weightMatch[1]).toFixed(2);
        if (volumeMatch) volumeInput.value = parseFloat(volumeMatch[1]).toFixed(2);
        calculate();
    }

    function calculate() {
        try {
            const volume = parseFloat(volumeInput.value) || 0;
            const gw = parseFloat(gwInput.value) || 0;
            const exchangeRate = parseFloat(exchangeRateInput.value) || 6.85;
            const rmbPerKg = parseFloat(rmbPerKgInput.value) || 0;
            const pickupRateRMB = parseFloat(pickupRateRMBInput.value) || 0;

            const billing = parseFloat(document.querySelector('input[name="billing"]:checked')?.value) || 0.006;
            let bubble = 0;
            if (billing === 0.006) {
                bubble = parseFloat(document.querySelector('input[name="bubble"]:checked')?.value) || 0.5;
            } else {
                bubble = parseFloat(document.querySelector('input[name="bubbleHk"]:checked')?.value) || 0.3333;
            }

            const hasBasic = volume > 0 && gw > 0;
            const hasPrice = rmbPerKg > 0;

            if (!hasBasic) {
                statusMessage.innerText = '请输入体积和重量';
                ['cw','ratio','costWeight','usdPerKg','rmbAfter','usdAfter','totalRMB','totalUSD','pickupRateUSD','pickupRMB','pickupUSD'].forEach(id => document.getElementById(id).innerText = '-');
                return;
            }

            statusMessage.innerText = hasPrice ? '✅ 计算完成' : '已计算基础参数，请输入RMB单价';

            const cw = volume / billing;
            document.getElementById('cw').innerText = cw.toFixed(2);

            const ratio = volume ? gw / volume : 0;
            document.getElementById('ratio').innerText = ratio.toFixed(2);

            const costWeight = gw + (cw - gw) * bubble;
            document.getElementById('costWeight').innerText = costWeight.toFixed(2);

            const costUsdPerKg = exchangeRate ? rmbPerKg / exchangeRate : 0;
            document.getElementById('usdPerKg').innerText = hasPrice ? costUsdPerKg.toFixed(2) : '-';

            const totalRMB = costWeight * rmbPerKg;
            const totalUSD = costWeight * costUsdPerKg;
            document.getElementById('totalRMB').innerText = hasPrice ? totalRMB.toFixed(2) : '-';
            document.getElementById('totalUSD').innerText = hasPrice ? totalUSD.toFixed(2) : '-';

            const rmbAfter = cw ? totalRMB / cw : 0;
            document.getElementById('rmbAfter').innerText = hasPrice ? rmbAfter.toFixed(2) : '-';
            const usdAfter = cw ? totalUSD / cw : 0;
            document.getElementById('usdAfter').innerText = hasPrice ? usdAfter.toFixed(2) : '-';

            // ========= 提货费单价USD（自动换算）=========
            const pickupRateUSD = exchangeRate ? pickupRateRMB / exchangeRate : 0;
            document.getElementById('pickupRateUSD').innerText = pickupRateRMB > 0 ? pickupRateUSD.toFixed(4) : '-';

            // ========= 提货费计算（固定系数200）=========
            let pickupRMB = 0;
            if (pickupRateRMB > 0 && volume > 0 && gw > 0) {
                if (cw > gw) {
                    pickupRMB = volume * 200 * pickupRateRMB;
                } else {
                    pickupRMB = gw * pickupRateRMB;
                }
            }
            const pickupUSD = exchangeRate ? pickupRMB / exchangeRate : 0;
            document.getElementById('pickupRMB').innerText = pickupRMB > 0 ? pickupRMB.toFixed(2) : '-';
            document.getElementById('pickupUSD').innerText = pickupUSD > 0 ? pickupUSD.toFixed(2) : '-';

        } catch(e) {
            statusMessage.innerText = '计算错误';
            console.error(e);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('input[name="billing"]').forEach(radio => {
            radio.addEventListener('change', () => {
                const isMainland = radio.value === "0.006";
                document.getElementById('mainlandBubble').classList.toggle('hidden', !isMainland);
                document.getElementById('hongkongBubble').classList.toggle('hidden', isMainland);
                calculate();
            });
        });
        document.querySelectorAll('input[name="bubble"], input[name="bubbleHk"]').forEach(r => r.addEventListener('change', calculate));
        smartInput.addEventListener('input', autoParseSmartInput);
        [volumeInput, gwInput, exchangeRateInput, rmbPerKgInput, pickupRateRMBInput].forEach(i => i.addEventListener('input', calculate));
        calculate();
    });
</script>
</body>
</html>
